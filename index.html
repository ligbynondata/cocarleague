    </div>
  `;
}

function recognitionAssetPath(asset) {
  return String(asset || '')
    .trim()
    .replace(/^\/+/, '')
    .replace(/\\/g, '/');
}

function achievementSeasonLabel(season) {
  const s = String(season || '').trim();

  if (!s) return 'Cocar 25';

  const normalized = s.toUpperCase().replace(/\s+/g, '');

  if (normalized === 'COCAR25') return 'Cocar 25';
  if (normalized === 'COCAR26A') return 'Cocar 26A';

  return s;
}

function profileKpi(label, value, sub, subClass) {
  const cls = subClass ? ` profile-kpi-sub-${subClass}` : '';

  return `
    <div class="profile-kpi-card">
      <div class="profile-kpi-label">${label}</div>
      <div class="profile-kpi-value">${value ?? '-'}</div>
      <div class="profile-kpi-sub${cls}">${sub || '&nbsp;'}</div>
    </div>
  `;
}

function criticalMini(label, record, wr) {
  return `
    <div class="critical-mini">
      <div class="critical-label">${label}</div>
      <div class="critical-value">${record || '-'}</div>
      <div class="critical-sub">${pctText(wr)}</div>
    </div>
  `;
}

function divisionPerfRow(div, record, wr) {
  const hasData = record && record !== '0-0';
  return `
    <div class="profile-row ${hasData ? '' : 'muted'}">
      <span>División ${div}</span>
      <strong>${hasData ? `${record} · ${pctText(wr)}` : 'Sin partidos'}</strong>
    </div>
  `;
}

function profileNum(v) {
  const n = Number(v || 0);
  return isNaN(n) ? 0 : n;
}

function profileDec(v) {
  const n = Number(v || 0);
  return isNaN(n) ? '0.00' : n.toFixed(2);
}

function profilePctFromParts(part, total) {
  const p = profileNum(part);
  const t = profileNum(total);

  if (t <= 0) return '0%';

  return `${Math.round((p / t) * 100)}%`;
}

function profileMatchBarRow(label, value, total) {
  const v = profileNum(value);
  const t = profileNum(total);
  const pct = t > 0 ? Math.round((v / t) * 100) : 0;

  return `
    <div class="stats-bar-row">
      <div class="stats-bar-label">${label}</div>
      <div class="stats-bar-track">
        <div class="stats-bar-fill" style="width:${pct}%;"></div>
      </div>
      <div class="stats-bar-value">${pct}%</div>
    </div>
  `;
}

function wrConditionItemHTML(label, wins, losses, unit) {
  const w = profileNum(wins);
  const l = profileNum(losses);
  const total = w + l;
  const pct = total > 0 ? Math.round((w / total) * 100) : 0;
  const pctLabel = total > 0 ? `${pct}%` : '-';

  return `
    <div class="wr-condition-item">
      <div class="wr-condition-pct">${pctLabel}</div>

      <div class="wr-condition-bar">
        <div class="wr-condition-fill" style="height:${pct}%;"></div>
      </div>

      <div class="wr-condition-label">${label}</div>
      <div class="wr-condition-total">${total} ${unit}</div>
    </div>
  `;
}

function buildPlayerWrConditionHTML(p) {
  return `
    <div class="wr-condition-grid">
      ${wrConditionItemHTML('2 sets', p.pg_2s, p.pp_2s, 'PJ')}
      ${wrConditionItemHTML('3 sets', p.pg_3s, p.pp_3s, 'PJ')}
      ${wrConditionItemHTML('Hammer', p.hammer_total_g, p.hammer_total_p, 'sets')}
      ${wrConditionItemHTML('Cold', p.cold_total_g, p.cold_total_p, 'sets')}
      ${wrConditionItemHTML('Tight', p.tight_total_g, p.tight_total_p, 'sets')}
      ${wrConditionItemHTML('Tie break', p.tb_total_g, p.tb_total_p, 'sets')}
    </div>
  `;
}

function pressureValueOrDash(value) {
  if (value === '' || value === null || value === undefined) return '—';

  const n = Number(value);

  if (Number.isNaN(n)) return '—';

  return Math.round(n);
}

function pressureSampleText(value, unit) {
  const n = pressureValueOrDash(value);

  if (n === '—' || n === 0) return '—';

  return `${n} ${unit}`;
}

function pressureLabelFromIndex(score) {
  const n = Number(score || 0);

  if (n >= 80) return 'Dominante';
  if (n >= 65) return 'Fuerte';
  if (n >= 50) return 'Competitivo';
  if (n >= 35) return 'Vulnerable';
  return 'En deuda';
}

function pressureToneClass(score) {
  const n = Number(score || 0);

  if (n >= 80) return 'elite';
  if (n >= 65) return 'strong';
  if (n >= 50) return 'mid';
  if (n >= 35) return 'warn';
  return 'low';
}

function pressureComponentRowHTML(label, score, sampleText) {
  return `
    <div class="pressure-component-row">
      <div class="pressure-component-main">
        <span class="pressure-component-label">${label}</span>
        <span class="pressure-component-sample">${sampleText || '—'}</span>
      </div>

      <strong class="pressure-component-score">${pressureValueOrDash(score)}</strong>
    </div>
  `;
}

function pressureGaugeHTML(score, label, isEmpty) {
  const safeScore = Math.max(0, Math.min(100, Math.round(Number(score || 0))));
  const arcLength = 300;
  const arcOffset = arcLength - ((arcLength * safeScore) / 100);

  if (isEmpty) {
    return `
      <div class="pressure-gauge-shell is-empty">
        <div class="pressure-gauge-score-top">—</div>

        <svg viewBox="0 0 240 118" class="pressure-gauge-svg" aria-hidden="true">
          <path
            d="M34 100 A86 86 0 0 1 206 100"
            class="pressure-gauge-arc-bg"
          />
        </svg>

        <div class="pressure-gauge-center">
          <div class="pressure-gauge-label">Insuficiente</div>
          <div class="pressure-gauge-dot"></div>
        </div>
      </div>
    `;
  }

  return `
    <div class="pressure-gauge-shell">
      <div class="pressure-gauge-score-top">${safeScore}</div>

      <svg viewBox="0 0 240 118" class="pressure-gauge-svg" aria-hidden="true">
        <defs>
          <linearGradient id="pressureGaugeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#c84d3f"/>
            <stop offset="30%" stop-color="#d88432"/>
            <stop offset="54%" stop-color="#c8a600"/>
            <stop offset="78%" stop-color="#7fae45"/>
            <stop offset="100%" stop-color="#2f8b56"/>
          </linearGradient>
        </defs>

        <path
          d="M34 100 A86 86 0 0 1 206 100"
          class="pressure-gauge-arc-bg"
        />

        <path
          d="M34 100 A86 86 0 0 1 206 100"
          class="pressure-gauge-arc-fill"
          pathLength="${arcLength}"
          stroke-dasharray="${arcLength}"
          stroke-dashoffset="${arcOffset}"
        />

        <circle cx="120" cy="94" r="3.2" class="pressure-gauge-hub"/>
      </svg>

      <div class="pressure-gauge-center">
        <div class="pressure-gauge-label">${label}</div>
        <div class="pressure-gauge-dot"></div>
      </div>
    </div>
  `;
}

function buildPressureIndexHTML(p) {
  const rawIndex = p.pressure_index;
  const hasIndex = rawIndex !== '' && rawIndex !== null && rawIndex !== undefined;
  const score = hasIndex ? Math.max(0, Math.min(100, Math.round(Number(rawIndex || 0)))) : null;
  const label = hasIndex
    ? (String(p.pressure_label || '').trim() || pressureLabelFromIndex(score))
    : 'Insuficiente';

  const tone = hasIndex ? pressureToneClass(score) : 'empty';

  return `
    <div class="pressure-index-layout ${tone}">
      <div class="pressure-gauge-area">
        ${pressureGaugeHTML(score, label, !hasIndex)}

        <div class="pressure-gauge-caption">
          ${hasIndex
            ? (p.pressure_summary || 'Lectura combinada de rendimiento en contextos de presión.')
            : 'Mínimo requerido: 5 partidos'}
        </div>
      </div>

      <div class="pressure-components-area">
  ${pressureComponentRowHTML('3 SETS', p.pressure_3s_score, pressureSampleText(p.pressure_3s_sample, 'PJ'))}
  ${pressureComponentRowHTML('TIGHT', p.pressure_tight_score, pressureSampleText(p.pressure_tight_sample, 'SETS'))}
  ${pressureComponentRowHTML('TIE BREAK', p.pressure_tb_score, pressureSampleText(p.pressure_tb_sample, 'SETS'))}
  ${pressureComponentRowHTML('Comeback / Collapse', p.pressure_cbs_score, pressureSampleText(p.pressure_cbs_sample, 'EV.'))}
</div>
    </div>
  `;
}

function buildPlayerMatchProfileHTML(p) {
  const total2S = profileNum(p.tot_2s);
  const total3S = profileNum(p.tot_3s);
  const totalMatches = total2S + total3S;

  const totalSets = profileNum(p.sets_g) + profileNum(p.sets_p);
  const totalGames = profileNum(p.games_g) + profileNum(p.games_p);

  const avgSets = totalMatches > 0 ? totalSets / totalMatches : 0;
  const avgGames = totalMatches > 0 ? totalGames / totalMatches : 0;

  return `
    ${profileMatchBarRow('2 sets', total2S, totalMatches)}
    ${profileMatchBarRow('3 sets', total3S, totalMatches)}

    <div class="stats-mini-split">
      <div class="stats-mini">
        <div class="stats-mini-label">Avg sets / partido</div>
        <div class="stats-mini-value">${profileDec(avgSets)}</div>
      </div>
      <div class="stats-mini">
        <div class="stats-mini-label">Avg games / partido</div>
        <div class="stats-mini-value">${profileDec(avgGames)}</div>
      </div>
    </div>
  `;
}

function profileSetRowHTML(name, desc, value, total) {
  const v = profileNum(value);
  const t = profileNum(total);
  const pct = t > 0 ? Math.round((v / t) * 100) : 0;

  return `
    <div class="stats-set-row">
      <div class="stats-set-label">
        <span class="stats-set-name">${name}</span>
        <span class="stats-set-desc">${desc}</span>
      </div>

      <div class="stats-set-track">
        <div class="stats-set-fill" style="width:${pct}%;"></div>
      </div>

      <div class="stats-set-pct">${pct}%</div>
    </div>
  `;
}

function buildPlayerSetProfileHTML(p) {
  const hammer = profileNum(p.hammer_total_g) + profileNum(p.hammer_total_p);
  const cold = profileNum(p.cold_total_g) + profileNum(p.cold_total_p);
  const tight = profileNum(p.tight_total_g) + profileNum(p.tight_total_p);
  const tieBreak = profileNum(p.tb_total_g) + profileNum(p.tb_total_p);

  const totalSetsProfile = hammer + cold + tight + tieBreak;

  return `
    ${profileSetRowHTML('Hammer', '6-0 / 6-1', hammer, totalSetsProfile)}
    ${profileSetRowHTML('Cold', '6-2 / 6-3', cold, totalSetsProfile)}
    ${profileSetRowHTML('Tight', '6-4 / 7-5', tight, totalSetsProfile)}
    ${profileSetRowHTML('Tie break', '7-6', tieBreak, totalSetsProfile)}
  `;
}

function pctText(v) {
  if (v === null || v === undefined || v === '') return '-';

  const n = Number(v);

  if (!isNaN(n)) {
    const pct = n <= 1 ? n * 100 : n;
    return `${Math.round(pct)}%`;
  }

  const s = String(v).trim();

  if (s.includes('%')) {
    const numeric = Number(s.replace('%', ''));
    if (!isNaN(numeric)) return `${Math.round(numeric)}%`;
  }

  return s;
}

function formatNum(v) {
  if (v === null || v === undefined || v === '') return '-';
  const n = Number(v);
  if (isNaN(n)) return v;
  return Math.round(n).toLocaleString('es-CL');
}

function ordinalPosition(v) {
  if (v === null || v === undefined || v === '') return '-';
  const n = Number(v);
  if (isNaN(n)) return String(v);
  return `${n}°`;
}

function zoneClass(zone) {
  const z = String(zone || '').toLowerCase();

  if (z.includes('ascenso')) return 'green';
  if (z.includes('descenso')) return 'red';

  return '';
}
function boldDivisionSeason(label) {
  const s = String(label || '');
  return s.replace(/^(\d+)/, '<strong>$1</strong>');
}

function boldPointsMix(label) {
  const s = String(label || '');

  return s.replace(/(G2|G3|P3|WO):(\d+)/g, (match, code, value) => {
    const n = Number(value);
    if (n > 0) return `${code}:<strong>${value}</strong>`;
    return `${code}:${value}`;
  });
}

function boldWR(label) {
  const s = String(label || '');
  return s.replace(/WR\s+([0-9]+(?:\.[0-9]+)?%)/, 'WR <strong>$1</strong>');
}
function playedWR(played, wrText) {
  const playedValue = played === null || played === undefined || played === '' ? '-' : played;
  const wr = boldWR(wrText || '-');

  return `Jugados <strong>${playedValue}</strong> · ${wr}`;
}

function sumValues(a, b) {
  return Number(a || 0) + Number(b || 0);
}
function recordDisplay(value) {
  if (value === null || value === undefined || value === '') return '-';

  const s = String(value).trim();

  // Google Visualization puede devolver records tipo 1-3 como Date(2026,0,3).
  // Lo reconstruimos como mes-día: 1-3, 2-6, etc.
  const m = s.match(/^Date\((\d{4}),(\d{1,2}),(\d{1,2})/);

  if (m) {
    const month = Number(m[2]) + 1;
    const day = Number(m[3]);
    return `${month}-${day}`;
  }

  return s;
}

function comebackCollapseStoryHTML() {
  return `
    <span class="profile-story-seq">
      <span class="story-chip l">L</span>
      <span class="story-chip w">W</span>
      <span class="story-chip w">W</span>
      <span class="story-separator">/</span>
      <span class="story-chip w">W</span>
      <span class="story-chip l">L</span>
      <span class="story-chip l">L</span>
    </span>
  `;
}
function streakSequenceHTML(value) {
  const seq = String(value || '')
    .trim()
    .replaceAll('-', ' ')
    .split(/\s+/)
    .map(v => v.trim().toUpperCase())
    .filter(v => v === 'W' || v === 'L');

  if (!seq.length) return '-';

  return `
    <span class="profile-story-seq">
      ${seq.map(v => `
        <span class="story-chip ${v === 'W' ? 'w' : 'l'}">${v}</span>
      `).join('')}
    </span>
  `;
}

function getCurrentPlayerContexts(playerName) {
  const targetPlayer = normalizeKey(playerName);

  return appPlayerCurrentContexts
    .filter(ctx => normalizeKey(ctx.player) === targetPlayer)
    .map(ctx => ({
      player: String(ctx.player || '').trim(),
      leagueId: String(ctx.league_id || '').trim(),
      contextOrder: Number(ctx.context_order || 999),
      role: String(ctx.role || '').trim(),
      division: normalizeDivision(ctx.division),
      isReplacement: Number(ctx.is_replacement || 0) === 1,
      tablePositionEnabled: Number(ctx.table_position_enabled || 0) === 1,
      tablePosition: Number(ctx.table_position || 0),
      positionZone: String(ctx.position_zone || '').trim(),
      points: ctx.points,
      pointsMixLabel: String(ctx.points_mix_label || '').trim(),
      matchWins: Number(ctx.match_wins || 0),
      matchLosses: Number(ctx.match_losses || 0),
      matchRecord: `${Number(ctx.match_wins || 0)}-${Number(ctx.match_losses || 0)}`,
      matchesPlayed: ctx.matches_played,
      matchWR: String(ctx.match_wr || '-').trim(),

      setsWon: Number(ctx.sets_won || 0),
      setsLost: Number(ctx.sets_lost || 0),
      setsRecord: `${Number(ctx.sets_won || 0)}-${Number(ctx.sets_lost || 0)}`,
      setsPlayed: ctx.sets_played,
      setsWR: String(ctx.sets_wr || '-').trim(),

      gamesWon: Number(ctx.games_won || 0),
      gamesLost: Number(ctx.games_lost || 0),
      gamesRecord: `${Number(ctx.games_won || 0)}-${Number(ctx.games_lost || 0)}`,
      gamesPlayed: ctx.games_played,
      gamesWR: String(ctx.games_wr || '-').trim()
    }))
    .filter(ctx => ctx.leagueId && ctx.division)
    .sort((a, b) =>
      a.contextOrder - b.contextOrder ||
      a.division.localeCompare(b.division)
    );
}

function currentSeasonContextBlockHTML(ctx) {
  return `
    <div class="profile-block-title-row">
      <div class="profile-block-title">Temporada actual</div>
      ${ctx.isReplacement ? '<span class="profile-context-pill replacement">Reemplazo</span>' : ''}
    </div>

    <div class="profile-kpi-grid profile-kpi-grid-6 current">
      ${profileKpi(
        'División',
        ctx.division || '-',
        ctx.isReplacement ? 'Participación reemplazo' : 'Participación oficial'
      )}

      ${profileKpi(
        'Posición tabla',
        ctx.tablePositionEnabled ? ordinalPosition(ctx.tablePosition) : '-',
        ctx.positionZone || (ctx.isReplacement ? 'No compite por tabla' : '-'),
        ctx.isReplacement ? '' : zoneClass(ctx.positionZone)
      )}

      ${profileKpi(
        'Puntos acumulados',
        ctx.points || '-',
        ctx.pointsMixLabel ? boldPointsMix(ctx.pointsMixLabel) : '-'
      )}

      ${profileKpi(
        'Match G-P',
        ctx.matchRecord || '-',
        playedWR(ctx.matchesPlayed, ctx.matchWR)
      )}

      ${profileKpi(
        'Sets G-P',
        ctx.setsRecord || '-',
        playedWR(ctx.setsPlayed, ctx.setsWR)
      )}

      ${profileKpi(
        'Games G-P',
        ctx.gamesRecord || '-',
        playedWR(ctx.gamesPlayed, ctx.gamesWR)
      )}
    </div>
  `;
}

function currentSeasonContextsHTML(playerName) {
  const contexts = getCurrentPlayerContexts(playerName);

  if (!contexts.length) {
    return `
      <div class="profile-block-title">Temporada actual</div>
      <div class="rank-empty">No hay contexto activo para este jugador.</div>
    `;
  }

  return contexts
    .map(ctx => currentSeasonContextBlockHTML(ctx))
    .join('');
}

// ── INIT ──
async function init() {
  try {
    const [
  standings,
  fixtures,
  matches,
  playerRows,
  summaryRows,
  rankingRows,
  leaguePlayerRows,
  statsSummaryRows,
  statsRankingRows,
  playerProfileRows,
  playerLigEvolutionRows,
  playerRecognitionRows,
  playerMatchLogRows,
  currentPlayerContextRows,
  appPlayerCurrentContextRows
] = await Promise.all([
  fetchSheet('division_standings'),
  fetchSheet('division_fixtures'),
  fetchSheet('app_h2h_matches'),
  fetchSheet('app_players'),
  fetchSheet('app_h2h_summary'),
  fetchSheet('ranking_last14'),
  fetchSheet('league_players'),
  fetchSheet('league_stats_summary'),
  fetchSheet('league_stats_rankings'),
  fetchSheet('app_player_profiles'),
  fetchSheet('app_player_lig_evolution'),
  fetchSheet('app_player_recognitions'),
  fetchSheet('player_match_log'),
  fetchSheet('current_player_contexts'),
  fetchSheet('app_player_current_contexts')
]);

    allStandings = standings;
    allFixtures = fixtures;
    allMatches = matches;
    players = playerRows;
    h2hSummary = summaryRows;
    rankRows = rankingRows;
    leaguePlayers = leaguePlayerRows;
    leagueStatsSummary = statsSummaryRows;
    leagueStatsRankings = statsRankingRows;
    playerProfiles = playerProfileRows;
    playerLigEvolution = playerLigEvolutionRows;
    playerRecognitions = playerRecognitionRows;
    playerMatchLog = playerMatchLogRows;
currentPlayerContexts = currentPlayerContextRows;
appPlayerCurrentContexts = appPlayerCurrentContextRows;

    renderLiga();
  } catch(err) {
    document.getElementById('page-liga').innerHTML =
      `<div class="loading">Error al cargar datos.<br><small>${err.message}</small></div>`;
  }
}

init();
</script>
</body>
