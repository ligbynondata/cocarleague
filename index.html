<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoCar League</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "wt7qdhuegj");
</script>

<style>
:root {
  --gold: #C8A600;
  --black: #111111;
  --bg: #F2F1ED;
  --white: #ffffff;
  --border: #E4E3DF;
  --text: #111111;
  --muted: #666;
  --light: #F8F7F4;
  --green: #16a34a;
  --red: #dc2626;

  --surface: rgba(255,255,255,0.88);
  --surface-strong: rgba(255,255,255,0.96);
  --line-soft: rgba(30,30,30,0.075);
  --gold-soft: rgba(200,166,0,0.16);
  --shadow-soft: 0 8px 26px rgba(24,20,12,0.055);
  --shadow-card: 0 14px 38px rgba(24,20,12,0.072);
  --shadow-hover: 0 16px 42px rgba(24,20,12,0.095);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', system-ui, sans-serif;
  color: var(--text);
  min-height: 100vh;
  background:
    radial-gradient(circle at 8% 0%, rgba(200,166,0,0.095), transparent 28%),
    radial-gradient(circle at 92% 12%, rgba(255,255,255,0.78), transparent 30%),
    linear-gradient(180deg, #fbfaf6 0%, #f2f1ed 42%, #eeece6 100%);
}

/* HEADER */
.header {
  background:
    linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,255,255,0.88));
  border-bottom: 1px solid rgba(30,30,30,0.06);
  padding: 10px 32px;
  min-height: 88px;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 2px 14px rgba(24,20,12,0.035);
  position: relative;
  z-index: 10;
}

.header::after {
  content: '';
  position: absolute;
  left: 32px;
  right: 32px;
  bottom: -1px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(200,166,0,0.22), transparent);
  pointer-events: none;
}

.brand-lig-img {
  height: 62px;
  width: auto;
  display: block;
  filter: drop-shadow(0 4px 9px rgba(0,0,0,0.055));
}

.brand-name {
  display: flex;
  align-items: center;
  gap: 4px;
  transform: translateY(4px);
}

.brand-by {
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: -0.15px;
}

.brand-nondata-img {
  height: 39px;
  width: auto;
  display: block;
  transform: translateY(1px);
}

/* NAV */
.nav {
  background: rgba(255,255,255,0.86);
  border-bottom: 1px solid rgba(30,30,30,0.065);
  padding: 0 32px;
  display: flex;
  gap: 4px;
  box-shadow: 0 4px 16px rgba(24,20,12,0.025);
  position: relative;
  z-index: 9;
}

.nav-btn {
  position: relative;
  padding: 12px 20px;
  font-size: 12px;
  font-weight: 700;
  color: rgba(17,17,17,0.62);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: color .18s ease, background .18s ease;
}

.nav-btn::after {
  content: '';
  position: absolute;
  left: 18px;
  right: 18px;
  bottom: -1px;
  height: 2px;
  border-radius: 999px;
  background: transparent;
  transition: background .18s ease, left .18s ease, right .18s ease;
}

.nav-btn:hover {
  color: var(--text);
  background: linear-gradient(180deg, transparent, rgba(200,166,0,0.04));
}

.nav-btn.active {
  color: var(--gold);
  border-bottom-color: transparent;
}

.nav-btn.active::after {
  left: 14px;
  right: 14px;
  background: var(--gold);
}

/* MAIN */
.main {
  padding: 18px 32px 30px;
  max-width: 1400px;
  margin: 0 auto;
}

/* PAGE HEADERS */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
  flex-wrap: wrap;
  gap: 10px;
}

.page-hero {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}

.page-hero-logo {
  width: 54px;
  height: 54px;
  object-fit: cover;
  border-radius: 50%;
  display: block;
  flex-shrink: 0;
}

.page-hero-title {
  font-size: 22px;
  font-weight: 750;
  color: var(--text);
  letter-spacing: -0.4px;
  line-height: 1.05;
}

.page-hero-subtitle {
  font-size: 12px;
  color: var(--muted);
  margin-top: 4px;
  line-height: 1.2;
}

.page-title {
  font-size: 22px;
  font-weight: 750;
  color: var(--text);
  letter-spacing: -0.4px;
}

.page-toolbar {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 18px;
  margin-bottom: 14px;
  display: flex;
  align-items: flex-start;
  justify-content: flex-start;
  gap: 12px 20px;
  flex-wrap: wrap;
  box-shadow: 0 2px 8px rgba(0,0,0,0.025);
}
.page-toolbar-heading {
  width: 100%;
  display: block;
  font-size: 10px;
  font-weight: 750;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .5px;
  line-height: 1;
  margin-bottom: -6px;
}

.page-toolbar-left {
  display: flex;
  align-items: flex-start;
  gap: 20px;
  flex-wrap: wrap;
}
.toolbar-group {
  display: flex;
  flex-direction: column;
  gap: 7px;
}

.toolbar-label {
  font-size: 9px;
  font-weight: 850;
  color: rgba(17,17,17,0.48);
  text-transform: uppercase;
  letter-spacing: .65px;
  line-height: 1;
}

.toolbar-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.toolbar-row select {
  background:
    linear-gradient(180deg, rgba(255,255,255,0.95), rgba(247,245,239,0.92));
  border: 1px solid rgba(30,30,30,0.085);
  border-radius: 10px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 700;
  padding: 8px 11px;
  cursor: pointer;
  outline: none;
  min-width: 130px;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.82),
    0 2px 6px rgba(24,20,12,0.035);
  transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
}

.toolbar-row select:focus {
  border-color: rgba(200,166,0,0.55);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.88),
    0 0 0 3px rgba(200,166,0,0.12),
    0 4px 10px rgba(24,20,12,0.045);
}

.page-toolbar-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .35px;
  margin-right: 4px;
  align-self: center;
}

.page-toolbar-note {
  font-size: 10px;
  color: var(--muted);
  line-height: 1.25;
}

.page-toolbar .fg label {
  font-size: 9px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: .5px;
  text-transform: uppercase;
}

.page-toolbar .fg select {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 600;
  padding: 7px 10px;
  cursor: pointer;
  outline: none;
  min-width: 120px;
}

.page-toolbar .fg select:focus {
  border-color: var(--gold);
}

@media (max-width: 600px) {
  .page-toolbar {
  padding: 10px 10px;
  gap: 10px;
}

.page-toolbar-left {
  width: 100%;
  display: flex;
  flex-wrap: nowrap;
  align-items: flex-start;
  gap: 10px;
}

.toolbar-group {
  width: auto;
  min-width: 0;
}

.toolbar-group:first-child {
  flex: 1 1 auto;
}

.toolbar-group:last-child {
  flex: 0 0 122px;
}

.toolbar-row {
  gap: 5px;
  flex-wrap: nowrap;
}

.page-toolbar .fg {
  width: auto;
}
.page-toolbar .div-tab {
  padding: 6px 9px;
  font-size: 11px;
  min-width: 0;
}
@media (max-width: 600px) {
  #page-h2h .page-toolbar {
    padding: 9px 8px;
    overflow: hidden;
  }

  #page-h2h .page-toolbar-left {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr 0.78fr 0.78fr;
    gap: 5px;
    align-items: flex-start;
  }

  #page-h2h .toolbar-group {
    width: 100%;
    min-width: 0;
    gap: 5px;
  }

  #page-h2h .toolbar-row {
    width: 100%;
    flex-wrap: nowrap;
  }

  #page-h2h .toolbar-row select {
    width: 100% !important;
    min-width: 0 !important;
    max-width: none !important;
    height: 34px;
    font-size: 9.8px !important;
    font-weight: 650;
    padding: 5px 4px !important;
    border-radius: 7px;
    text-overflow: ellipsis;
  }

  #page-h2h .toolbar-label {
    font-size: 7.5px;
    letter-spacing: .25px;
    white-space: nowrap;
  }
}

#page-liga .page-toolbar select {
  min-width: 122px !important;
  max-width: 122px;
  padding: 7px 8px !important;
  font-size: 11px !important;
  border-radius: 9px;
}

  .page-toolbar .fg select {
    width: 100%;
    min-width: 0;
  }
}
/* ── STATS TOOLBAR MOBILE ── */
@media (max-width: 600px) {
  #page-stats .page-toolbar-left {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    align-items: flex-start;
  }

  #page-stats .toolbar-group {
    width: 100%;
    min-width: 0;
  }


  #page-stats .toolbar-row {
    width: 100%;
    flex-wrap: nowrap;
  }

  #page-stats .toolbar-row select {
    width: 100% !important;
    min-width: 0 !important;
    max-width: none !important;
    height: 34px;
    font-size: 10.5px !important;
    font-weight: 650;
    padding: 6px 7px !important;
    border-radius: 7px;
  }

  #page-stats .toolbar-label {
    font-size: 8px;
    letter-spacing: .35px;
  }
}

@media (max-width: 600px) {
  .page-hero {
    gap: 10px;
    margin-bottom: 14px;
  }

  .page-hero-logo {
    width: 48px;
    height: 48px;
  }

  .page-hero-title {
    font-size: 20px;
  }

  .page-hero-subtitle {
    font-size: 11px;
    margin-top: 3px;
  }
}

.fg { display: flex; flex-direction: column; gap: 3px; }
.fg label { font-size: 9px; font-weight: 700; color: var(--muted); letter-spacing: .5px; text-transform: uppercase; }
.fg select {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 7px; color: var(--text);
  font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500;
  padding: 7px 10px; cursor: pointer; outline: none; min-width: 110px;
}
.fg select:focus { border-color: var(--gold); }

/* ── LIGA PAGE ── */
.liga-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
  align-items: start;
}

/* Division tabs */
.div-tabs { display: flex; gap: 4px; margin-bottom: 14px; }
.div-tab {
  padding: 8px 18px;
  font-size: 12px;
  font-weight: 750;
  border-radius: 10px;
  border: 1px solid rgba(30,30,30,0.09);
  background:
    linear-gradient(180deg, rgba(255,255,255,0.96), rgba(250,249,245,0.92));
  color: rgba(17,17,17,0.66);
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: background .18s ease, color .18s ease, border-color .18s ease, transform .16s ease, box-shadow .18s ease;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.88),
    0 2px 6px rgba(24,20,12,0.035);
}

.div-tab:hover:not(.active) {
  background:
    linear-gradient(180deg, rgba(255,255,255,1), rgba(250,248,241,0.96));
  color: var(--black);
  border-color: rgba(200,166,0,0.28);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.95),
    0 6px 14px rgba(24,20,12,0.06);
  transform: translateY(-1px);
}

.div-tab.active {
  background:
    linear-gradient(180deg, #171717 0%, #0f0f0f 100%);
  color: #fff;
  border-color: rgba(0,0,0,0.88);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.08),
    0 8px 18px rgba(0,0,0,0.17),
    0 0 0 1px rgba(200,166,0,0.08);
}

/* Standings card */
.card {
  background:
    linear-gradient(180deg, rgba(255,255,255,0.98), rgba(252,251,247,0.94));
  border: 1px solid rgba(30,30,30,0.075);
  border-radius: 18px;
  overflow: hidden;
  box-shadow: var(--shadow-card);
  position: relative;
}

.card::before {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  border-radius: inherit;
  background:
    linear-gradient(135deg, rgba(255,255,255,0.72), transparent 38%),
    radial-gradient(circle at 0% 0%, rgba(200,166,0,0.045), transparent 36%);
  opacity: .95;
  z-index: 0;
}

.card > * {
  position: relative;
  z-index: 1;
}
.card-header {
  padding: 17px 20px 15px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid rgba(30,30,30,0.065);
  background:
    linear-gradient(180deg, rgba(255,255,255,0.72), rgba(250,249,245,0.42));
}
.card-title { 
  font-size: 11px; 
  font-weight: 850; 
  color: var(--text); 
  letter-spacing: .45px; 
  text-transform: uppercase; 
  line-height: 1;
}

.card-title-wrap {
  display: inline-flex;
  align-items: center;
  gap: 10px;
}

.live-pill-mini {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 20px;
  padding: 0 9px;
  border-radius: 999px;
  background:
    linear-gradient(180deg, #dcfce7, #c8f7d7);
  color: #166534;
  border: 1px solid rgba(22,101,52,0.14);
  font-size: 8px;
  font-weight: 900;
  letter-spacing: .45px;
  line-height: 1;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.72),
    0 3px 8px rgba(22,101,52,0.08);
}

.card-meta { 
  font-size: 11px; 
  color: rgba(17,17,17,0.58);
  font-weight: 550;
  line-height: 1;
}

.standings-table { 
  width: 100%; 
  border-collapse: collapse; 
  table-layout: fixed;
}
.standings-table th:nth-child(1),
.standings-table td:nth-child(1) {
  width: 7%;
}

.standings-table th:nth-child(2),
.standings-table td:nth-child(2) {
  width: 27%;
}

.standings-table th:nth-child(3),
.standings-table td:nth-child(3) {
  width: 9%;
}

.standings-table th:nth-child(4),
.standings-table td:nth-child(4) {
  width: 10%;
}

.standings-table th:nth-child(5),
.standings-table td:nth-child(5),
.standings-table th:nth-child(6),
.standings-table td:nth-child(6),
.standings-table th:nth-child(7),
.standings-table td:nth-child(7) {
  width: 8%;
}

.standings-table th:nth-child(8),
.standings-table td:nth-child(8),
.standings-table th:nth-child(9),
.standings-table td:nth-child(9) {
  width: 11%;
}
.standings-table th {
  font-size: 10px;
  font-weight: 850;
  color: rgba(17,17,17,0.46);
  letter-spacing: .55px;
  text-transform: uppercase;
  padding: 11px 12px 10px;
  text-align: center;
  border-bottom: 1px solid rgba(30,30,30,0.06);
  background:
    linear-gradient(180deg, rgba(255,255,255,0.58), rgba(250,249,245,0.38));
}
.standings-table th:nth-child(2) { text-align: left; }
.standings-table td {
  padding: 10px 12px;
  font-size: 12px;
  color: rgba(17,17,17,0.68);
  border-bottom: 1px solid rgba(30,30,30,0.045);
  text-align: center;
  vertical-align: middle;
  transition:
    background .18s ease,
    color .18s ease,
    box-shadow .18s ease;
}
.standings-table tbody tr:hover td:nth-child(2) {
  color: var(--black);
  font-weight: 800;
}
.standings-table td:nth-child(2) {
  text-align: left;
  color: rgba(17,17,17,0.78);
  font-weight: 650;
}
.standings-table tr:last-child td { border-bottom: none; }

.replacement-row-first td {
  border-top: 6px solid rgba(242,241,237,0.9);
}

.standings-table tbody tr {
  transition:
    background .18s ease,
    transform .18s ease,
    box-shadow .18s ease;
  cursor: default;
}

.standings-table tbody tr:hover td {
  background:
    linear-gradient(180deg, rgba(255,255,255,0.92), rgba(250,248,242,0.78));
  color: var(--text);
}

.standings-table tbody tr:hover td:first-child {
  position: relative;
}

.standings-table tbody tr:hover td:first-child::before {
  content: '';
  position: absolute;
  left: 0;
  top: 9px;
  bottom: 9px;
  width: 3px;
  background:
    linear-gradient(180deg, rgba(200,166,0,0.45), var(--gold), rgba(200,166,0,0.45));
  border-radius: 999px;
  box-shadow: 0 0 8px rgba(200,166,0,0.22);
}

.pos-badge {
  width: 25px;
  height: 25px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 850;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.45),
    0 3px 8px rgba(24,20,12,0.08);
}

.pos-1 {
  background:
    radial-gradient(circle at 35% 25%, rgba(255,255,255,0.42), transparent 34%),
    linear-gradient(180deg, #d7b42e, var(--gold));
  color: #fff;
}

.pos-2 {
  background:
    radial-gradient(circle at 35% 25%, rgba(255,255,255,0.5), transparent 34%),
    linear-gradient(180deg, #eeeeee, #d7d7d7);
  color: #333;
}

.pos-3 {
  background:
    radial-gradient(circle at 35% 25%, rgba(255,255,255,0.45), transparent 34%),
    linear-gradient(180deg, #e6bd86, #c99152);
  color: #fff;
}

.pos-other {
  width: 25px;
  height: 25px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 800;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.92), rgba(244,242,237,0.94));
  color: rgba(17,17,17,0.56);
  border: 1px solid rgba(30,30,30,0.075);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.72),
    0 2px 6px rgba(24,20,12,0.045);
}

.pos-badge,
.pos-other {
  transition: transform .18s ease, box-shadow .18s ease;
}

.standings-table tbody tr:hover .pos-badge,
.standings-table tbody tr:hover .pos-other,
.standings-table tbody tr:hover .pos-replacement {
  transform: scale(1.06);
}
.pos-asc-dark {
  background:
    radial-gradient(circle at 35% 25%, rgba(255,255,255,0.35), transparent 34%),
    linear-gradient(180deg, #22c55e, #15803d);
  color: #fff;
}

.pos-asc {
  background:
    radial-gradient(circle at 35% 25%, rgba(255,255,255,0.42), transparent 34%),
    linear-gradient(180deg, #86efac, #4ade80);
  color: #14532d;
}

.pos-rel {
  background:
    radial-gradient(circle at 35% 25%, rgba(255,255,255,0.35), transparent 34%),
    linear-gradient(180deg, #f87171, #dc2626);
  color: #fff;
}

.pos-rel-dark {
  background:
    radial-gradient(circle at 35% 25%, rgba(255,255,255,0.2), transparent 34%),
    linear-gradient(180deg, #991b1b, #7f1d1d);
  color: #fff;
}

.pos-replacement {
  width: 25px;
  height: 25px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 900;
  background:
    linear-gradient(180deg, #1c1c1c, #0f0f0f);
  color: #fff;
  border: 1px solid rgba(0,0,0,0.88);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.08),
    0 3px 8px rgba(0,0,0,0.12);
}

.pts-cell {
  font-weight: 900;
  color: var(--text);
  font-size: 13px;
  letter-spacing: -0.15px;
}

    linear-gradient(135deg, rgba(255,255,255,0.62), transparent 42%);

.rank-row.top-2 {
  border-color: rgba(150,156,164,0.32);
  box-shadow:
    var(--shadow-card),
    inset 5px 0 0 #b9c0c8,
    inset 0 0 0 1px rgba(160,168,180,0.08);
}

.rank-row.top-2::before {
  background:
    linear-gradient(110deg, rgba(232,236,240,0.72), transparent 34%),
    radial-gradient(circle at 0% 50%, rgba(160,168,180,0.16), transparent 32%),
    linear-gradient(135deg, rgba(255,255,255,0.62), transparent 42%);
}

.rank-row.top-3 {
  border-color: rgba(201,145,82,0.38);
  box-shadow:
    var(--shadow-card),
    inset 5px 0 0 #c99152,
    inset 0 0 0 1px rgba(201,145,82,0.08);
}

.rank-row.top-3::before {
  background:
    linear-gradient(110deg, rgba(255,233,210,0.68), transparent 34%),
    radial-gradient(circle at 0% 50%, rgba(201,145,82,0.16), transparent 32%),
    linear-gradient(135deg, rgba(255,255,255,0.62), transparent 42%);
}

.rank-cell {
  min-height: 68px;
  padding: 0 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.rank-cell + .rank-cell {
  border-left: 1px solid rgba(0,0,0,0.055);
}

.rank-cell.player {
  justify-content: flex-start;
}

.rank-pos {
  width: 34px;
  height: 34px;
  border-radius: 999px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 900;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.95), rgba(242,240,235,0.92));
  color: var(--text);
  border: 1px solid rgba(30,30,30,0.08);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.82),
    0 3px 8px rgba(24,20,12,0.06);
}

.rank-pos.top1 {
  background:
    radial-gradient(circle at 35% 25%, rgba(255,255,255,0.46), transparent 34%),
    linear-gradient(180deg, #f2d65a 0%, #d4af37 52%, #b88910 100%);
  color: #fff;
  border-color: rgba(184,137,16,0.7);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.42),
    0 5px 13px rgba(200,166,0,0.26);
}

.rank-pos.top2 {
  background:
    radial-gradient(circle at 35% 25%, rgba(255,255,255,0.62), transparent 34%),
    linear-gradient(180deg, #f2f3f5 0%, #cdd2d8 54%, #aeb5be 100%);
  color: #20242a;
  border-color: rgba(150,156,164,0.55);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.62),
    0 5px 13px rgba(120,128,138,0.18);
}

.rank-pos.top3 {
  background:
    radial-gradient(circle at 35% 25%, rgba(255,255,255,0.46), transparent 34%),
    linear-gradient(180deg, #e6b173 0%, #c99152 52%, #a86227 100%);
  color: #fff;
  border-color: rgba(168,98,39,0.58);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.36),
    0 5px 13px rgba(201,145,82,0.22);
}

.rank-player {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  padding: 7px 12px;
  border: 1px solid rgba(30,30,30,0.065);
  background:
    linear-gradient(180deg, rgba(255,255,255,0.86), rgba(250,248,242,0.72));
  border-radius: 14px;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.78),
    0 2px 7px rgba(24,20,12,0.025);
}

.rank-player-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  object-fit: cover;
  border: 1px solid #ddd7ca;
  background: var(--bg);
  flex-shrink: 0;
}

.rank-player-initials {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--bg);
  border: 1px solid #ddd7ca;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 850;
  color: var(--gold);
  flex-shrink: 0;
}

.rank-player-info {
  display: flex;
  flex-direction: column;
  gap: 5px;
  min-width: 0;
}

.rank-player-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.15;
  letter-spacing: -0.2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.rank-score {
  font-size: 13px;
  font-weight: 560;
  color: var(--text);
  line-height: 20px;
  letter-spacing: -0.08px;
}

.rank-label {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 11px;
  min-height: 11px;
  margin: 0;
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .45px;
  line-height: 1;
  text-align: center;
  white-space: nowrap;
}

.rank-metric {
  text-align: center;
  display: grid;
  grid-template-rows: 11px 20px;
  justify-items: center;
  align-content: start;
  row-gap: 5px;
  min-height: 36px;
}

.rank-metric-value {
  font-size: 13px;
  font-weight: 560;
  color: var(--text);
  line-height: 20px;
  letter-spacing: -0.08px;
}

.rank-result-mobile {
  display: none;
}

.rank-result-desktop {
  display: inline;
}

.div-chip {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: fit-content;
  min-width: 22px;
  padding: 2px 6px;
  border-radius: 5px;
  font-size: 9px;
  font-weight: 650;
  background: var(--gold);
  color: #fff;
  border: 1px solid var(--gold);
  letter-spacing: 0.1px;
  line-height: 1.1;
}

.div-chip.no-division {
  background: #111;
  color: #fff;
  border-color: #111;
}

.div-chip.replacement {
  background: #dc2626;
  color: #fff;
  border-color: #dc2626;
}

.rank-racha-w {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 40px;
  height: 21px;
  padding: 0 8px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 700;
  line-height: 1;
  background: #dcfce7;
  color: #166534;
}

.rank-racha-l {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 40px;
  height: 21px;
  padding: 0 8px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 700;
  line-height: 1;
  background: #fee2e2;
  color: #991b1b;
}

.rank-player-score-mobile {
  margin-left: auto;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  justify-content: center;
  min-width: 92px;
  padding-left: 12px;
}

.rank-player-score-value {
  font-size: 20px;
  font-weight: 850;
  color: var(--text);
  line-height: 1;
  letter-spacing: -0.6px;
}

.rank-player-score-label {
  font-size: 8px;
  font-weight: 750;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .45px;
  margin-top: 4px;
  line-height: 1;
}

.rank-empty {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px;
  text-align: center;
  color: var(--muted);
  font-size: 13px;
}

@media (max-width: 760px) {
  .rank-list {
    gap: 8px;
  }

  .rank-row {
    display: block;
    min-height: auto;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: var(--shadow-card);
  }

  .rank-row:hover {
    transform: none;
  }

  .rank-row.top-1,
  .rank-row.top-2,
  .rank-row.top-3 {
    min-height: 126px;
  }

  .rank-row.top-1 {
    border-color: rgba(200,166,0,0.48);
    box-shadow:
      var(--shadow-card),
      inset 4px 0 0 #d4af37,
      inset 0 0 0 1px rgba(200,166,0,0.10);
  }

  .rank-row.top-2 {
    border-color: rgba(150,156,164,0.34);
    box-shadow:
      var(--shadow-card),
      inset 4px 0 0 #b9c0c8,
      inset 0 0 0 1px rgba(160,168,180,0.09);
  }

  .rank-row.top-3 {
    border-color: rgba(201,145,82,0.42);
    box-shadow:
      var(--shadow-card),
      inset 4px 0 0 #c99152,
      inset 0 0 0 1px rgba(201,145,82,0.10);
  }

  .rank-cell {
    min-height: auto;
    padding: 0;
    border-left: none !important;
  }

  .rank-cell.position {
    position: absolute;
    top: 17px;
    left: 15px;
    z-index: 3;
  }

  .rank-cell.player {
    padding: 12px 14px 10px 64px;
  }

  .rank-player {
    border: none;
    background: transparent;
    box-shadow: none;
    padding: 0;
    gap: 12px;
  }

  .rank-player-score-mobile {
    margin-left: auto;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    justify-content: center;
    min-width: 78px;
    padding-left: 8px;
  }

  .rank-player-score-value {
    font-size: 22px;
    font-weight: 950;
    color: var(--text);
    line-height: 1;
    letter-spacing: -0.8px;
  }

  .rank-player-score-label {
    font-size: 7.5px;
    font-weight: 850;
    color: rgba(17,17,17,0.52);
    text-transform: uppercase;
    letter-spacing: .45px;
    margin-top: 3px;
    line-height: 1;
  }

  .rank-player-avatar,
  .rank-player-initials {
    width: 52px;
    height: 52px;
  }

  .rank-row.top-1 .rank-player-avatar,
  .rank-row.top-1 .rank-player-initials,
  .rank-row.top-2 .rank-player-avatar,
  .rank-row.top-2 .rank-player-initials,
  .rank-row.top-3 .rank-player-avatar,
  .rank-row.top-3 .rank-player-initials {
    width: 56px;
    height: 56px;
  }

  .rank-player-name {
    font-size: 18px;
    font-weight: 850;
    letter-spacing: -0.35px;
    line-height: 1.05;
    white-space: normal;
    overflow: visible;
    text-overflow: unset;
    word-break: normal;
    overflow-wrap: anywhere;
  }

  .rank-row.top-1 .rank-player-name,
  .rank-row.top-2 .rank-player-name,
  .rank-row.top-3 .rank-player-name {
    font-size: 19px;
    font-weight: 900;
  }

  .div-chip {
    font-size: 9.5px;
    padding: 3px 7px;
    border-radius: 6px;
    min-width: 24px;
    font-weight: 800;
  }

  .rank-mobile-stats {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    border-top: 1px solid rgba(30,30,30,0.06);
    padding: 8px 8px 9px;
    align-items: center;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.32), rgba(250,248,242,0.34));
  }

  .rank-mobile-stats .rank-cell {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 0 5px;
    min-width: 0;
  }

  .rank-mobile-stats .rank-cell + .rank-cell {
    border-left: 1px solid rgba(30,30,30,0.06) !important;
  }

  .rank-metric {
    display: grid;
    grid-template-rows: 10px 20px;
    justify-items: center;
    align-content: start;
    row-gap: 4px;
    min-height: 34px;
    padding-top: 0;
  }

  .rank-label {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    height: 10px;
    min-height: 10px;
    margin: 0;
    line-height: 1;
    font-weight: 850;
    color: rgba(17,17,17,0.50);
    letter-spacing: .25px;
    white-space: nowrap;
  }

  .rank-result-desktop {
    display: none;
  }

  .rank-result-mobile {
    display: inline;
  }

  .rank-result-mix {
    font-size: 11px;
    font-weight: 800;
    line-height: 20px;
    letter-spacing: -0.1px;
    white-space: nowrap;
  }

  .rank-metric-value {
    font-size: 12px;
    font-weight: 800;
    line-height: 20px;
    letter-spacing: -0.05px;
    color: var(--text);
  }

  .rank-racha-w,
  .rank-racha-l {
    min-width: 40px;
    height: 21px;
    padding: 0 8px;
    font-size: 10px;
    font-weight: 850;
    align-self: center;
  }
}

/* ── LIG PLAYERS PAGE ── */
.player-profile-hero {
  --hero-avatar: 84px;

  background: var(--white);
  color: var(--text);
  border: 1px solid #e8e3d8;
  border-radius: 18px;
  padding: 10px 22px;
  margin-bottom: 14px;
  min-height: 146px;

  display: grid;
  grid-template-columns: 154px 1px minmax(0, 1fr) 1px 136px;
  align-items: center;
  gap: 18px;

  box-shadow: 0 2px 8px rgba(0,0,0,0.025);
  position: relative;
  overflow: visible;
}

.player-profile-divider {
  width: 1px;
  height: 104px;
  background: linear-gradient(
    to bottom,
    transparent,
    rgba(0,0,0,0.07),
    rgba(200,166,0,0.18),
    rgba(0,0,0,0.06),
    transparent
  );
  position: relative;
  z-index: 1;
}

/* Identidad */
.player-profile-identity {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-rows: 92px 28px;
  justify-items: center;
  align-items: center;
  gap: 0;
  min-width: 0;
}

.player-profile-avatar,
.player-profile-initials {
  width: var(--hero-avatar);
  height: var(--hero-avatar);
  border-radius: 50%;
  flex-shrink: 0;
  border: 2.5px solid rgba(200,166,0,0.95);
  object-fit: cover;
  align-self: center;
}

.player-profile-avatar {
  background: #f2f1ed;
  box-shadow:
    inset 0 2px 10px rgba(255,255,255,0.65),
    0 4px 10px rgba(0,0,0,0.16);
}

.player-profile-initials {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--gold);
  font-size: 23px;
  font-weight: 850;
  background:
    radial-gradient(circle at 50% 38%, rgba(255,255,255,0.96) 0%, rgba(246,244,239,0.9) 42%, rgba(232,226,214,0.72) 100%);
  box-shadow:
    inset 0 2px 8px rgba(255,255,255,0.86),
    inset 0 -10px 18px rgba(0,0,0,0.035),
    0 5px 12px rgba(0,0,0,0.13);
  overflow: hidden;
}

.player-profile-initials::before {
  content: '';
  position: absolute;
  width: 38%;
  height: 38%;
  top: 17%;
  border-radius: 50%;
  background: rgba(200,166,0,0.08);
  pointer-events: none;
}

.player-profile-initials::after {
  content: '';
  position: absolute;
  width: 66%;
  height: 34%;
  bottom: 10%;
  border-radius: 50% 50% 38% 38%;
  background: rgba(200,166,0,0.055);
  pointer-events: none;
}

.player-profile-name {
  width: 100%;
  max-width: 148px;
  font-size: 22px;
  font-weight: 850;
  letter-spacing: -0.65px;
  line-height: 1.05;
  color: var(--text);
  text-align: center;
  white-space: normal;
  overflow: visible;
  text-overflow: unset;
  word-break: normal;
  align-self: start;
}

/* Centro: palmarés */
.player-profile-core {
  position: relative;
  z-index: 1;
  min-width: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.player-recognition-shelf {
  width: 100%;
  min-width: 0;
  height: 132px;
  display: grid;
  grid-template-rows: 16px 108px 8px;
  gap: 0;
  align-items: center;
  overflow: hidden;
}

.player-recognition-heading {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 9px;
  font-size: 10px;
  font-weight: 900;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 1.9px;
  line-height: 1;
}

.player-recognition-heading::before,
.player-recognition-heading::after {
  content: '';
  width: 36px;
  height: 1px;
  background: linear-gradient(
    90deg,
    transparent,
    rgba(200,166,0,0.58),
    transparent
  );
}

.player-recognition-heading-mark {
  display: none;
}

.player-recognition-window {
  position: relative;
  min-width: 0;
  height: 108px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 34px;
}

.player-recognition-grid {
  width: min(100%, 468px);
  height: 108px;
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 14px;
  align-items: center;
  justify-items: center;
}

.player-recognition-item {
  width: 136px;
  min-width: 0;
  height: 108px;
  display: grid;
  grid-template-rows: 70px 18px 16px;
  align-items: center;
  justify-items: center;
  gap: 2px;
  text-align: center;
  position: relative;
}

.player-recognition-media {
  width: 130px;
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: visible;
  position: relative;
}

.player-recognition-item.asset-missing .player-recognition-media::after {
  content: 'asset';
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 54px;
  height: 24px;
  border: 1px dashed #d8d2c6;
  border-radius: 999px;
  color: var(--muted);
  font-size: 8px;
  font-weight: 850;
  text-transform: uppercase;
  letter-spacing: .5px;
  background: #fbfaf6;
}

.player-recognition-img {
  display: block;
  object-fit: contain;
  filter: drop-shadow(0 4px 7px rgba(0,0,0,0.14));
  transition: transform .18s ease, filter .18s ease;
}

.player-recognition-item:hover .player-recognition-img {
  transform: translateY(-3px) scale(1.045);
  filter: drop-shadow(0 7px 10px rgba(0,0,0,0.18));
}

.player-recognition-img.medal {
  width: 76px;
  height: 76px;
  border-radius: 50%;
}

.player-recognition-img.promotion {
  width: 110px;
  height: 62px;
}

.player-recognition-img.special {
  width: 64px;
  height: 62px;
}

.player-recognition-title {
  width: 100%;
  font-size: 11.5px;
  font-weight: 850;
  line-height: 1.08;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  align-self: end;
}

.player-recognition-season {
  width: 100%;
  font-size: 11px;
  font-weight: 750;
  line-height: 1.05;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  align-self: start;
}

.player-recognition-nav {
  position: absolute;
  top: 50%;
  width: 24px;
  height: 30px;
  border: 1px solid #ded6c8;
  border-radius: 999px;
  background: #fbfaf6;
  color: var(--gold);
  font-size: 21px;
  font-weight: 850;
  line-height: 1;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transform: translateY(-50%);
  cursor: pointer;
  box-shadow: 0 2px 7px rgba(0,0,0,0.045);
  transition: background .16s ease, border-color .16s ease, transform .16s ease, opacity .16s ease;
}

.player-recognition-nav:hover:not(.disabled) {
  background: #fffdf6;
  border-color: rgba(200,166,0,0.55);
  transform: translateY(-50%) scale(1.04);
}

.player-recognition-nav.prev {
  left: 4px;
}

.player-recognition-nav.next {
  right: 4px;
}

.player-recognition-nav.disabled {
  opacity: .25;
  cursor: default;
}

.player-recognition-dots {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
}

.player-recognition-dot {
  width: 5px;
  height: 5px;
  border: 0;
  border-radius: 999px;
  background: #d8d2c6;
  cursor: pointer;
  padding: 0;
  transition: width .16s ease, background .16s ease;
}

.player-recognition-dot.active {
  width: 13px;
  height: 5px;
  background: var(--gold);
}

.player-recognition-ghost {
  opacity: .72;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1.6px dashed rgba(200,166,0,0.42);
  background:
    linear-gradient(135deg, rgba(255,255,255,0.94), rgba(242,241,237,0.62));
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.95),
    inset 0 -8px 18px rgba(200,166,0,0.035),
    0 4px 10px rgba(0,0,0,0.045);
}

.player-recognition-ghost::before {
  content: '';
  display: block;
  opacity: .34;
  background: rgba(200,166,0,0.38);
}

.player-recognition-ghost::after {
  content: '';
  position: absolute;
  inset: -5px;
  border-radius: inherit;
  border: 1px solid rgba(200,166,0,0.08);
  pointer-events: none;
}

.player-recognition-ghost.placeholder-medal {
  width: 66px;
  height: 66px;
  border-radius: 50%;
}

.player-recognition-ghost.placeholder-medal::before {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  box-shadow:
    0 0 0 8px rgba(200,166,0,0.08),
    0 0 0 16px rgba(200,166,0,0.035);
}

.player-recognition-ghost.placeholder-promotion {
  width: 96px;
  height: 50px;
  border-radius: 12px;
}

.player-recognition-ghost.placeholder-promotion::before {
  width: 62px;
  height: 30px;
  border-radius: 9px;
  clip-path: polygon(8% 0%, 92% 0%, 100% 50%, 92% 100%, 8% 100%, 0% 50%);
}

.player-recognition-ghost.placeholder-special {
  width: 56px;
  height: 50px;
  clip-path: polygon(50% 0%, 90% 22%, 90% 72%, 50% 100%, 10% 72%, 10% 22%);
}

.player-recognition-ghost.placeholder-special::before {
  width: 30px;
  height: 30px;
  clip-path: polygon(50% 0%, 62% 35%, 100% 35%, 70% 56%, 82% 94%, 50% 72%, 18% 94%, 30% 56%, 0% 35%, 38% 35%);
}

.player-recognition-ghost.placeholder-neutral {
  width: 64px;
  height: 58px;
  opacity: 0;
}

/* Derecha: ranking + puntos */
.player-profile-side {
  position: relative;
  z-index: 1;
  min-width: 136px;
  height: 120px;
  display: grid;
  grid-template-rows: 55px 1px 55px;
  gap: 5px;
  align-items: center;
  justify-items: end;
}

.player-profile-side::before {
  content: '';
  grid-row: 2;
  width: 100%;
  height: 1px;
  background: linear-gradient(
    90deg,
    transparent,
    rgba(200,166,0,0.28),
    transparent
  );
}

.profile-rank-metric {
  width: 100%;
  display: grid;
  grid-template-rows: 12px 36px;
  gap: 4px;
  justify-items: end;
  align-content: center;
}

.profile-rank-metric.top {
  grid-row: 1;
  height: 55px;
}

.profile-rank-metric.bottom {
  grid-row: 3;
  height: 55px;
}

.profile-rank-number {
  grid-row: 2;
  font-size: 39px;
  font-weight: 900;
  line-height: 1;
  letter-spacing: -1px;
  color: var(--gold);
  text-align: right;
  align-self: start;
  transform: none;
}

.profile-rank-points {
  grid-row: 2;
  font-size: 37px;
  font-weight: 900;
  line-height: 1;
  letter-spacing: -1px;
  color: var(--gold);
  text-align: right;
  align-self: start;
  transform: none;
}

.profile-rank-label,
.profile-rank-points-label {
  grid-row: 1;
  font-size: 9px;
  font-weight: 850;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .65px;
  line-height: 1;
  text-align: right;
  align-self: end;
  transform: none;
}

/* Bloques de contenido */
.profile-block-title {
  font-size: 11px;
  font-weight: 850;
  color: var(--text);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin: 16px 0 9px;
}

.profile-block-title-row {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 8px;
  margin: 16px 0 9px;
}

.profile-block-title-row .profile-block-title {
  margin: 0;
}

.profile-context-pill {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 20px;
  padding: 0 9px;
  border-radius: 999px;
  font-size: 9px;
  font-weight: 850;
  letter-spacing: .45px;
  text-transform: uppercase;
  line-height: 1;
}

.profile-context-pill.replacement {
  background: #fee2e2;
  color: #991b1b;
  border: 1px solid #fecaca;
}

.profile-block-title:first-of-type {
  margin-top: 0;
}

.profile-kpi-grid {
  display: grid;
  gap: 10px;
  margin-bottom: 14px;
}

.profile-kpi-grid-6 {
  grid-template-columns: repeat(6, minmax(0, 1fr));
}

.profile-kpi-grid-6 .profile-kpi-card {
  min-height: 92px;
  height: 92px;
}

.profile-kpi-card {
  background: var(--white);
  border: 1px solid #e8e3d8;
  border-radius: 14px;
  padding: 10px 14px;
  min-height: 92px;
  height: 92px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.025);
  display: grid;
  grid-template-rows: 14px 1fr 14px;
  align-items: center;
  overflow: hidden;
}

.profile-kpi-label {
  font-size: 9px;
  font-weight: 800;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .45px;
  line-height: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.profile-kpi-value {
  font-size: 27px;
  font-weight: 850;
  color: var(--text);
  line-height: 1;
  letter-spacing: -0.7px;
  align-self: center;
}

.profile-kpi-sub {
  font-size: 10px;
  color: var(--muted);
  line-height: 1.15;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  align-self: end;
}

.profile-kpi-sub-green {
  color: var(--green);
  font-weight: 850;
}

.profile-kpi-sub-red {
  color: var(--red);
  font-weight: 850;
}

.profile-kpi-sub strong {
  font-size: calc(1em + 2px);
  font-weight: 900;
  color: inherit;
}

.profile-story-seq {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 3px;
  white-space: nowrap;
}

.profile-story-seq .story-chip {
  width: 17px;
  height: 17px;
  border-radius: 5px;
  font-size: 9px;
  font-weight: 900;
}

.story-separator,
.profile-story-seq .story-separator {
  font-size: 10px;
  font-weight: 800;
  color: var(--muted);
  margin: 0 2px;
}

.profile-section-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 12px;
  align-items: start;
}

.profile-panel {
  background: var(--white);
  border: 1px solid #e8e3d8;
  border-radius: 14px;
  padding: 16px 18px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.025);
}

/* Cards hermanas: Rendimiento por división + Rachas */
.profile-section-grid > .profile-panel {
  padding: 14px 18px 14px;
}

.profile-section-grid > .profile-panel .profile-panel-title {
  margin-bottom: 10px;
}

.profile-section-grid > .profile-panel .profile-row {
  min-height: 29px;
}

.profile-panel.dark {
  background: #111111;
  color: #fff;
  border-color: #111111;
}

.profile-panel-title {
  font-size: 11px;
  font-weight: 850;
  color: var(--text);
  text-transform: uppercase;
  letter-spacing: .45px;
  margin-bottom: 12px;
}

.profile-panel.dark .profile-panel-title {
  color: #fff;
}

.profile-summary {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.45;
  margin-bottom: 14px;
}

.profile-panel.dark .profile-summary {
  color: rgba(255,255,255,0.72);
}

.profile-critical-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

.critical-mini {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px;
  padding: 10px 8px;
  text-align: center;
}

.critical-label {
  font-size: 8px;
  font-weight: 800;
  color: rgba(255,255,255,0.62);
  text-transform: uppercase;
  letter-spacing: .45px;
  margin-bottom: 5px;
}

.critical-value {
  font-size: 18px;
  font-weight: 850;
  color: #fff;
  line-height: 1;
}

.critical-sub {
  font-size: 9px;
  color: var(--gold);
  font-weight: 750;
  margin-top: 5px;
}

.profile-row {
  min-height: 34px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  border-bottom: 1px solid #f0eee8;
  font-size: 12px;
}

.profile-row:last-child {
  border-bottom: none;
}

.profile-row span {
  color: var(--muted);
}

.profile-row strong {
  color: var(--text);
  font-weight: 800;
  text-align: right;
}

.profile-row.muted strong {
  color: #aaa;
  font-weight: 600;
}

.muted-panel {
  background: #fbfaf6;
}

/* Tablet */
@media (max-width: 900px) {
  .player-profile-hero {
    --hero-avatar: 82px;
    grid-template-columns: 112px 1px minmax(0, 1fr) 1px 116px;
    gap: 16px;
    padding: 16px 18px;
  }

  .player-profile-name {
    font-size: 21px;
  }

  .player-profile-band {
    grid-template-columns: 62px minmax(0, 1fr);
    gap: 12px;
  }

  .profile-rank-number {
    font-size: 31px;
  }

  .profile-rank-points {
    font-size: 31px;
  }

  .profile-kpi-grid-6 {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .profile-section-grid {
    grid-template-columns: 1fr;
  }

  .profile-critical-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

/* Mobile */
@media (max-width: 600px) {
  .player-profile-hero {
    --hero-avatar: 56px;
    grid-template-columns: 72px 1px minmax(0, 1fr) 68px;
    gap: 7px;
    padding: 8px 9px;
    border-radius: 14px;
    min-height: 104px;
    align-items: center;
    overflow: hidden;
  }

  .player-profile-divider {
    display: block;
    width: 1px;
    height: 78px;
    opacity: .72;
  }

  /*
    En mobile dejamos solo el divisor entre identidad y reconocimientos.
    El segundo divisor existe en el HTML desktop, pero en mobile debe desaparecer
    para que el ranking no salte a una segunda fila.
  */
  .player-profile-hero > .player-profile-divider:nth-of-type(4) {
    display: none;
  }

  .player-profile-identity {
    display: grid;
    grid-template-rows: 56px 17px;
    justify-items: center;
    align-items: center;
    gap: 4px;
    min-width: 0;
  }

  .player-profile-avatar,
  .player-profile-initials {
    width: 56px;
    height: 56px;
    border-width: 2px;
    font-size: 19px;
  }

  .player-profile-name {
    width: 72px;
    max-width: 72px;
    font-size: 12px;
    font-weight: 850;
    line-height: 1;
    letter-spacing: -0.25px;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .player-profile-core {
    min-width: 0;
    overflow: hidden;
  }

  .player-recognition-shelf {
    width: 100%;
    min-width: 0;
    height: 78px;
    grid-template-rows: 9px 1fr 6px;
    gap: 2px;
    overflow: hidden;
  }

  .player-recognition-heading {
    gap: 4px;
    font-size: 6.4px;
    letter-spacing: .9px;
  }

  .player-recognition-heading::before,
  .player-recognition-heading::after {
    width: 15px;
  }

  .player-recognition-window {
    height: 61px;
    padding: 0;
  }

  .player-recognition-grid {
    width: 100%;
    max-width: 156px;
    height: 61px;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 3px;
  }

  .player-recognition-item {
    width: 50px;
    height: 61px;
    grid-template-rows: 40px 10px 7px;
    gap: 1px;
  }

  .player-recognition-media {
    width: 50px;
    height: 40px;
  }
  .player-recognition-item.asset-missing .player-recognition-media::after {
  width: 34px;
  height: 16px;
  font-size: 5.5px;
}

  .player-recognition-img.medal {
    width: 34px;
    height: 34px;
    border-radius: 50%;
  }

  .player-recognition-img.promotion {
    width: 48px;
    height: 28px;
  }

  .player-recognition-img.special {
    width: 34px;
    height: 34px;
  }

  .player-recognition-title {
    font-size: 5.8px;
    font-weight: 850;
    line-height: 1;
  }

  .player-recognition-season {
    font-size: 5.9px;
    font-weight: 750;
    line-height: 1;
  }

  .player-recognition-nav {
    display: none;
  }

  .player-recognition-dots {
    gap: 3px;
  }

  .player-recognition-dot {
    width: 4px;
    height: 4px;
  }

  .player-recognition-dot.active {
    width: 9px;
    height: 4px;
  }

  .player-recognition-ghost.placeholder-medal {
    width: 30px;
    height: 30px;
  }

  .player-recognition-ghost.placeholder-promotion {
    width: 44px;
    height: 24px;
    border-radius: 7px;
  }

  .player-recognition-ghost.placeholder-special {
    width: 30px;
    height: 30px;
  }

  .player-recognition-ghost.placeholder-neutral {
    width: 30px;
    height: 30px;
  }

  .player-profile-side {
    min-width: 68px;
    width: 68px;
    height: 78px;
    display: grid;
    grid-template-rows: 34px 1px 34px;
    gap: 4px;
    justify-items: end;
    align-items: center;
  }

  .player-profile-side::before {
    grid-row: 2;
    width: 100%;
  }

  .profile-rank-metric {
    width: 100%;
    display: grid;
    grid-template-rows: 8px 22px;
    gap: 2px;
    justify-items: end;
    align-content: center;
  }

  .profile-rank-metric.top {
    grid-row: 1;
    height: 34px;
  }

  .profile-rank-metric.bottom {
    grid-row: 3;
    height: 34px;
  }

  .profile-rank-number {
    grid-row: 2;
    font-size: 22px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: -0.6px;
    transform: none;
    align-self: start;
    white-space: nowrap;
  }

  .profile-rank-points {
    grid-row: 2;
    font-size: 21px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: -0.7px;
    transform: none;
    align-self: start;
    white-space: nowrap;
  }

  .profile-rank-label,
  .profile-rank-points-label {
    grid-row: 1;
    font-size: 5.5px;
    font-weight: 850;
    line-height: 1;
    letter-spacing: .18px;
    transform: none;
    align-self: end;
    white-space: nowrap;
  }

  .profile-kpi-grid-6 {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }

  .profile-kpi-grid-6 .profile-kpi-card {
    height: 80px;
    min-height: 80px;
    padding: 9px 12px;
    grid-template-rows: 13px 1fr 13px;
  }

  .profile-kpi-value {
    font-size: 22px;
  }

  .profile-kpi-label {
    font-size: 8px;
  }

  .profile-kpi-sub {
    font-size: 8.5px;
  }

  .profile-panel {
    padding: 14px;
  }

  .profile-critical-grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .profile-row {
    font-size: 11px;
  }
}

/* ── LIG PLAYERS COMPETITIVE PROFILE ── */
.profile-competitive-panel {
  margin-bottom: 14px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.profile-competitive-card {
  min-width: 0;
  padding: 16px 18px;
  background: var(--white);
  border: 1px solid #e8e3d8;
  border-radius: 14px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.025);
  overflow: hidden;
}

.profile-competitive-card + .profile-competitive-card {
  border-left: 1px solid #e8e3d8;
}

.profile-competitive-title {
  font-size: 11px;
  font-weight: 850;
  color: var(--text);
  text-transform: uppercase;
  letter-spacing: .45px;
  line-height: 1;
  margin-bottom: 5px;
}

.profile-competitive-subtitle {
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  line-height: 1.15;
  margin-bottom: 13px;
}

.profile-competitive-body {
  min-width: 0;
}

.profile-competitive-card {
  display: block;
}

.profile-competitive-body {
  min-width: 0;
}

.wr-condition-grid {
  height: 158px;
  display: grid;
  grid-template-columns: repeat(6, minmax(0, 1fr));
  align-items: end;
  gap: 10px;
  padding-top: 4px;
}

.wr-condition-item {
  min-width: 0;
  height: 100%;
  display: grid;
  grid-template-rows: 22px 1fr 16px 14px;
  justify-items: center;
  align-items: end;
  text-align: center;
}

.wr-condition-pct {
  font-size: 13px;
  font-weight: 800;
  color: var(--text);
  line-height: 1;
  letter-spacing: 0;
}

.wr-condition-bar {
  width: 12px;
  height: 78px;
  border-radius: 999px;
  background: #ebe7df;
  display: flex;
  align-items: flex-end;
  overflow: hidden;
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.035);
}

.wr-condition-fill {
  width: 100%;
  min-height: 4px;
  border-radius: 999px;
  background: var(--gold);
}

.wr-condition-label {
  max-width: 100%;
  font-size: 9px;
  font-weight: 900;
  color: var(--text);
  text-transform: uppercase;
  line-height: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.wr-condition-total {
  font-size: 10px;
  font-weight: 650;
  color: var(--muted);
  line-height: 1;
  white-space: nowrap;
}

.pressure-index-layout {
  height: 158px;
  min-height: 158px;
  display: grid;
  grid-template-columns: 48% 52%;
  gap: 10px;
  align-items: stretch;
  overflow: hidden;
}

.pressure-gauge-area {
  min-width: 0;
  display: grid;
  grid-template-rows: 126px 1fr;
  align-items: end;
  justify-items: center;
  padding-top: 14px;
}

.pressure-gauge-shell {
  position: relative;
  width: 100%;
  max-width: 226px;
  height: 108px;
  overflow: visible;
}

.pressure-gauge-score-top {
  position: absolute;
  left: 50%;
  top: -26px;
  transform: translateX(-50%);
  z-index: 2;
  font-size: 27px;
  font-weight: 900;
  color: var(--text);
  line-height: 1;
  letter-spacing: -0.8px;
  text-align: center;
}

.pressure-gauge-svg {
  width: 100%;
  height: 100%;
  display: block;
}

.pressure-gauge-arc-bg {
  fill: none;
  stroke: #ebe7df;
  stroke-width: 11;
  stroke-linecap: round;
}

.pressure-gauge-arc-fill {
  fill: none;
  stroke: url(#pressureGaugeGradient);
  stroke-width: 11;
  stroke-linecap: round;
  transition: stroke-dashoffset .35s ease;
}

.pressure-gauge-hub {
  fill: #242424;
}

.pressure-gauge-center {
  position: absolute;
  left: 50%;
  top: 69px;
  width: 128px;
  transform: translateX(-50%);
  text-align: center;
}

.pressure-gauge-label {
  margin-bottom: 4px;
  font-size: 9px;
  font-weight: 850;
  color: var(--text);
  text-transform: uppercase;
  letter-spacing: .35px;
  line-height: 1;
  white-space: nowrap;
}

.pressure-gauge-dot {
  display: none;
}

.pressure-gauge-caption {
  width: 100%;
  max-width: 224px;
  font-size: 8px;
  font-weight: 650;
  color: var(--muted);
  line-height: 1.15;
  text-align: center;
  overflow: hidden;
  display: -webkit-box;
  line-clamp: 2;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  margin-top: -13px;
}

.pressure-components-area {
  min-width: 0;
  display: grid;
  grid-template-rows: repeat(4, 30px);
  gap: 6px;
  align-content: center;
  align-self: stretch;
  padding-right: 12px;
}

.pressure-component-row {
  min-width: 0;
  border: 1px solid #eee6d9;
  border-radius: 10px;
  background:
    linear-gradient(180deg, #fffdf8 0%, #fbfaf6 100%);
  padding: 0 12px;
  display: grid;
  grid-template-columns: minmax(0, 1fr) 34px;
  align-items: center;
  column-gap: 10px;
  overflow: hidden;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.82),
    0 1px 3px rgba(0,0,0,0.018);
}

.pressure-component-main {
  min-width: 0;
  display: flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
  overflow: hidden;
}

.pressure-component-label {
  font-size: 10px;
  font-weight: 900;
  color: var(--text);
  text-transform: uppercase;
  letter-spacing: .25px;
  line-height: 1;
  white-space: nowrap;
}

.pressure-component-sample {
  font-size: 9px;
  font-weight: 750;
  color: #5f6672;
  line-height: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.pressure-component-label::after {
  content: '·';
  margin-left: 6px;
  color: #b9b1a4;
  font-weight: 900;
}

.pressure-component-score {
  font-size: 14px;
  font-weight: 950;
  color: var(--text);
  line-height: 1;
  text-align: right;
  letter-spacing: -0.25px;
}

.pressure-index-layout.low .pressure-gauge-value,
.pressure-index-layout.warn .pressure-gauge-value,
.pressure-index-layout.mid .pressure-gauge-value,
.pressure-index-layout.strong .pressure-gauge-value,
.pressure-index-layout.elite .pressure-gauge-value {
  color: var(--text);
}

// ── DATA ACCESS · GOOGLE SHEETS ──
function normalizeGvizValue(cell) {
  if (!cell) return null;

  const raw = cell.v;

  if (raw === null || raw === undefined) return null;

  const s = String(raw).trim();

  // Google Visualization puede devolver números chicos con formato fecha.
  // Ej: Date(1900,0,3) debe leerse como 3.
  const dateMatch = s.match(/^Date\((\d{4}),(\d{1,2}),(\d{1,2})/);

  if (dateMatch) {
    const year = Number(dateMatch[1]);
    const month = Number(dateMatch[2]);
    const day = Number(dateMatch[3]);

    if (year === 1899 && month === 11 && day === 30) return 0;
    if (year === 1899 && month === 11 && day === 31) return 1;
    if (year === 1900 && month === 0) return day;

    return cell.f !== undefined && cell.f !== null ? cell.f : s;
  }

  return raw;
}

async function fetchSheet(sheetName) {
  const url = `${API}&sheet=${encodeURIComponent(sheetName)}&headers=1`;
  const response = await fetch(url);
  const text = await response.text();

  const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);

  if (!match) {
    throw new Error(`No se pudo leer la hoja: ${sheetName}`);
  }

  const json = JSON.parse(match[1]);
  const cols = json.table.cols.map(col => col.label);

  return json.table.rows.map(row => {
    const obj = {};

    cols.forEach((col, index) => {
      obj[col] = normalizeGvizValue(row.c[index]);
    });

    return obj;
  });
}

function currentStreakFromSeq(seqArr) {
  if (!seqArr || seqArr.length === 0) return '';

  const last = seqArr[seqArr.length - 1];
  if (last !== 'W' && last !== 'L') return '';

  let count = 0;

  for (let i = seqArr.length - 1; i >= 0; i--) {
    if (seqArr[i] === last) {
      count++;
    } else {
      break;
    }
  }

  return `${last}${count}`;
}

function isReplacementPlayer(playerName, leagueId) {
  if (!playerName || !leagueId) return false;

  const targetPlayer = normalizeKey(playerName);
  const targetLeague = normalizeLeagueKey(leagueId);

  return leaguePlayers.some(lp => {
    const lpLeague = normalizeLeagueKey(lp.league_id);
    const lpPlayer = normalizeKey(lp.player_name);
    const lpRole = normalizeKey(lp.role);

    return (
      lpLeague === targetLeague &&
      lpPlayer === targetPlayer &&
      lpRole === 'reemplazo'
    );
  });
}

function isReplacementPlayerInLeaguePlayers(playerName, leagueId, division) {
  if (!playerName || !leagueId || !division) return false;

  const targetPlayer = normalizeKey(playerName);
  const targetLeague = normalizeLeagueKey(leagueId);
  const targetDivision = normalizeDivision(division);

  return leaguePlayers.some(lp => {
    const lpLeague = normalizeLeagueKey(lp.league_id);
    const lpPlayer = normalizeKey(lp.player_name);
    const lpRole = normalizeKey(lp.role);

    const replacementDivision = normalizeDivision(lp.replacement_division);
    const registeredDivision = normalizeDivision(lp.registered_division);

    const replacementTargetDivision = replacementDivision || registeredDivision;

    return (
      lpLeague === targetLeague &&
      lpPlayer === targetPlayer &&
      lpRole === 'reemplazo' &&
      replacementTargetDivision === targetDivision
    );
  });
}

function isReplacementPlayerInDivision(playerName, leagueId, division) {
  if (!playerName || !leagueId || !division) return false;

  const targetPlayer = normalizeKey(playerName);
  const targetLeague = normalizeLeagueKey(leagueId);
  const targetDivision = normalizeDivision(division);

  const hasContextsForTargetLeague =
    Array.isArray(currentPlayerContexts) &&
    currentPlayerContexts.some(ctx =>
      normalizeLeagueKey(ctx.current_league_id) === targetLeague
    );

  if (hasContextsForTargetLeague) {
    return currentPlayerContexts.some(ctx => {
      const ctxPlayer = normalizeKey(ctx.player);
      const ctxLeague = normalizeLeagueKey(ctx.current_league_id);
      const ctxDivision = normalizeDivision(ctx.stats_division);
      const isReplacement = Number(ctx.is_replacement || 0) === 1;

      return (
        ctxPlayer === targetPlayer &&
        ctxLeague === targetLeague &&
        ctxDivision === targetDivision &&
        isReplacement
      );
    });
  }

  // Fallback histórico: ligas cerradas como Cocar25.
  return isReplacementPlayerInLeaguePlayers(playerName, leagueId, division);
}

function displayPlayerName(playerName, leagueId, division) {

function renderStats() {
  const selectedLeague = currentStatsLiga || 'Cocar26A';
  const selectedDivision = currentStatsDiv || 'ALL';

  resetStatsCarouselsForContext(selectedLeague, selectedDivision);

  const row =
    leagueStatsSummary.find(r =>
      String(r.league_id || '') === selectedLeague &&
      String(r.division || '') === selectedDivision
    ) || {};

  const isClosedLeague = selectedLeague !== 'Cocar26A' && selectedLeague !== 'ALL';
  const tableLimit = 5;

  function n(v) {
    return Number(v || 0);
  }

  function fmtInt(v) {
    return Math.round(n(v)).toLocaleString('es-CL');
  }

  function fmtPct(v) {
    const value = n(v);
    return `${Math.round(value * 100)}%`;
  }

  function fmtDec(v) {
    return n(v).toFixed(2);
  }

  function normalizeLeagueKey(v) {
    return String(v || '')
      .trim()
      .toUpperCase()
      .replace(/\s+/g, '');
  }

  function pctOfSets(v) {
    return n(row.sets_played) > 0
      ? `${Math.round((n(v) / n(row.sets_played)) * 100)}%`
      : '0%';
  }

  function getRankRows(category, limit = tableLimit) {
    return leagueStatsRankings
      .filter(r =>
        String(r.league_id || '') === selectedLeague &&
        String(r.division || '') === selectedDivision &&
        String(r.category || '') === category
      )
      .sort((a, b) => n(a.rank) - n(b.rank))
      .slice(0, limit);
  }

  function getOfficialTopRow(category) {
    return leagueStatsRankings
      .filter(r =>
        String(r.league_id || '') === selectedLeague &&
        String(r.division || '') === 'ALL' &&
        String(r.category || '') === category
      )
      .sort((a, b) => n(a.rank) - n(b.rank))[0] || null;
  }

  function formatStatsRankValue(category, rankRow) {
    if (!rankRow) return '—';

    const percentCategories = [
      'PERFORMANCE_RATE',
      'TOP_WIN_RATE',
      'SETS_WIN_RATE',
      'GAMES_WIN_RATE'
    ];

    const wrCompositeCategories = [
      'SOFT_SETS_WON',
      'HARD_SETS_WON',
      'THIRD_SET_WINS'
    ];

    function fmtPct0(value) {
      const raw = String(value ?? '').trim();

      if (raw.includes('%')) {
        const parsed = Number(raw.replace('%', '').replace(',', '.'));
        return isNaN(parsed) ? raw : `${Math.round(parsed)}%`;
      }

      const numeric = n(value);
      const pct = numeric <= 1 ? numeric * 100 : numeric;

      return `${Math.round(pct)}%`;
    }

    if (percentCategories.includes(category)) {
      return fmtPct0(rankRow.value);
    }

    if (
      category === 'MOST_WINS' ||
      category === 'MR_COMEBACK' ||
      category === 'MR_FARRA' ||
      category === 'MR_HAMMER' ||
      category === 'MR_TIE_BREAK'
    ) {
      return fmtInt(rankRow.value);
    }

    if (wrCompositeCategories.includes(category)) {
      const rawLabel = String(rankRow.label || '').trim();

      const parts = rawLabel.split('·').map(x => x.trim());
      const mainValue = parts[0] || fmtInt(rankRow.value);
      const wrRaw = parts[1] || '';

      const wrClean = wrRaw
        ? wrRaw.replace(/WR\s+([0-9]+(?:[.,][0-9]+)?%)/, (_, pct) => `WR ${fmtPct0(pct)}`)
        : '';

      return wrClean
        ? `${mainValue} <span style="font-weight:500;color:var(--text);">${wrClean}</span>`
        : mainValue;
    }

    return rankRow.label || rankRow.value || '—';
  }

  function rankCard(title, category, note) {
    const rows = getRankRows(category);

    const cardHeadRightHTML = !isClosedLeague
      ? `<span class="live-pill-mini">LIVE</span>`
      : category === 'MR_COMEBACK'
      ? `<div class="story-seq">
          <span class="story-chip l">L</span>
          <span class="story-chip w">W</span>
          <span class="story-chip w">W</span>
        </div>`
      : category === 'MR_FARRA'
      ? `<div class="story-seq">
          <span class="story-chip w">W</span>
          <span class="story-chip l">L</span>
          <span class="story-chip l">L</span>
        </div>`
      : '';

    return `
      <div class="stats-rank-card">
        <div class="stats-rank-head">
          <div class="stats-rank-title">${title}</div>
          ${cardHeadRightHTML}
        </div>

        ${
          rows.length === 0

            : rows.map(r => `
              <div class="stats-rank-row">

  }

function renderRank() {
  const rows = [...rankRows].sort((a,b) => (a.rank_position||999) - (b.rank_position||999));

    const n = Number(v || 0);
    return Math.round(n).toLocaleString('es-CL');

  function getPlayerData(playerName) {
    return players.find(x => x.player_name === playerName || x.player === playerName) || {};
  }

  function playerBlockHTML(playerName, scoreText) {
    const p = getPlayerData(playerName);
    const url = p.photo_url || '';
    const div = p.division_actual || p['division_actual'] || p['división_actual'] || '';
const isReplacement = div === 'Reemplazo';

const divDisplay = isReplacement
  ? 'R'
  : (div && div !== '-' ? div : '—');

const chipClass = isReplacement
  ? 'div-chip replacement'
  : (divDisplay === '—' ? 'div-chip no-division' : 'div-chip');

const divLabel = isReplacement
  ? 'Reemplazo'
  : `División ${divDisplay}`;

    const avatarHTML = (url && String(url).startsWith('http'))
      ? `
        <img class="rank-player-avatar" src="${url}" alt="${playerName}"
          onerror="this.style.display='none';this.nextElementSibling.style.display='inline-flex'">
        <span class="rank-player-initials" style="display:none;">${ini(playerName)}</span>
      `
      : `

      `;

    return `
  <div class="rank-player">

      <span class="rank-player-score-label">LIG PTS</span>
    </div>
  </div>
`;

  function rachaHTML(playerName) {
    const p = getPlayerData(playerName);

    if (!racha) return '<span class="rank-metric-value">—</span>';
    const cls = racha.startsWith('W') ? 'rank-racha-w' : 'rank-racha-l';
    return `<span class="${cls}">${racha}</span>`;
  }

  function rowClass(pos) {
    if (pos === 1) return 'top-1';
    if (pos === 2) return 'top-2';
    if (pos === 3) return 'top-3';

</div>

        fill: false
      }]
    },

            },
            label: function(item) {

              }

            },

              }

          },

function buildLigEvolutionSeries(p) {
  const playerName = String(p.player || '').trim();

  const realRows = playerLigEvolution
    .filter(r => String(r.player || '').trim() === playerName)
    .sort((a, b) => Number(a.match_number || 0) - Number(b.match_number || 0));

  if (realRows.length > 0) {
    const latestMatchNumber = Math.max(...realRows.map(r => Number(r.match_number || 0)));

    const windowEnd = Math.max(14, latestMatchNumber);
    const windowStart = windowEnd - 13;

    const labels = Array.from({ length: 14 }, (_, i) => windowStart + i);

    const rowByMatchNumber = {};
    realRows.forEach(r => {
      rowByMatchNumber[Number(r.match_number || 0)] = r;
    });

    const values = labels.map(matchNumber => {
      const row = rowByMatchNumber[matchNumber];
      if (!row) return null;
      return Number(row.points_total || 0);
    });

    const deltas = labels.map(matchNumber => {
      const row = rowByMatchNumber[matchNumber];

      if (
        !row ||
        row.points_delta === null ||
        row.points_delta === undefined ||
        row.points_delta === ''
      ) {
        return 0;
      }

      return Number(row.points_delta || 0);
    });

    const rows = labels.map(matchNumber => rowByMatchNumber[matchNumber] || null);

    const pointRadius = labels.map((matchNumber, i) => {
      const hasValue = values[i] !== null && values[i] !== undefined;

      if (!hasValue) return 0;
      if (matchNumber === latestMatchNumber) return 6;
      if (matchNumber === 14 || matchNumber === 15) return 5.5;

      return 3.5;
    });

    return {
      labels,
      values,
      deltas,
      pointRadius,
      rows,
      isReal: true,
      windowStart,
      windowEnd
    };
  }

  // Fallback visual si la hoja aún no trae data para el jugador
  const total = Number(p.score_last14 || 0);
  const played = Math.max(1, Number(p.matches_played || p.matches_counted || 14));
  const visiblePlayed = Math.min(Math.max(played, 1), 14);

  const labels = Array.from({ length: 14 }, (_, i) => i + 1);

  const shape = [
    0.09, 0.15, 0.23, 0.30, 0.36, 0.43, 0.50,
    0.58, 0.65, 0.72, 0.80, 0.88, 0.94, 1.00
  ];

  const values = labels.map((_, i) => {
    if (i + 1 > visiblePlayed) return null;

    const factor = shape[i] || ((i + 1) / 14);
    return Math.max(0, Math.round(total * factor));
  });

  const deltas = values.map((v, i) => {
    if (v === null || v === undefined) return 0;
    if (i === 0 || values[i - 1] === null || values[i - 1] === undefined) return 0;
    return v - values[i - 1];
  });

  const pointRadius = labels.map((_, i) => {
    if (values[i] === null || values[i] === undefined) return 0;
    if (i === 0) return 4;
    if (i === visiblePlayed - 1) return 6;
    if ([3, 7, 11].includes(i)) return 5;
    return 3.5;
  });

  return {
    labels,
    values,
    deltas,
    pointRadius,
    rows: [],
    isReal: false,
    windowStart: 1,
    windowEnd: 14
  };
}

function ligEvolutionLabelsPlugin(series) {
  return {
    id: 'ligEvolutionLabelsPlugin',
    afterDatasetsDraw(chart) {
      const { ctx } = chart;
      const meta = chart.getDatasetMeta(0);

      if (!meta || !meta.data || meta.data.length === 0) return;

      const highlightIndexes = [0, 3, 7, 11, meta.data.length - 1]
        .filter((v, i, arr) => v >= 0 && v < meta.data.length && arr.indexOf(v) === i);

      ctx.save();

      highlightIndexes.forEach(idx => {
        const point = meta.data[idx];
        const value = series.values[idx];

        if (!point || value === undefined || value === null) return;

        const x = point.x;
        const y = point.y;
        const isLast = idx === meta.data.length - 1;

        const text = isLast ? `${formatNum(value)}` : formatNum(value);
        const sub = isLast ? 'TOTAL ACTUAL' : '';

        ctx.font = isLast ? '900 12px Inter' : '850 10px Inter';
        const textWidth = ctx.measureText(text).width;
        const boxW = Math.max(textWidth + 18, isLast ? 76 : 44);
        const boxH = isLast ? 34 : 24;

        const boxX = Math.min(Math.max(x - boxW / 2, 8), chart.width - boxW - 8);
        const boxY = Math.max(y - boxH - 18, 8);

        ctx.strokeStyle = 'rgba(200,166,0,0.72)';
        ctx.fillStyle = 'rgba(17,17,17,0.86)';
        ctx.lineWidth = 1;

        roundRect(ctx, boxX, boxY, boxW, boxH, 6);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = '#C8A600';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = isLast ? '900 13px Inter' : '850 10px Inter';
        ctx.fillText(text, boxX + boxW / 2, boxY + (isLast ? 12 : 12));

        if (isLast) {
          ctx.fillStyle = 'rgba(255,255,255,0.72)';
          ctx.font = '850 7px Inter';
          ctx.fillText(sub, boxX + boxW / 2, boxY + 25);
        }

        ctx.beginPath();
        ctx.setLineDash([2, 3]);
        ctx.moveTo(x, boxY + boxH);
        ctx.lineTo(x, y - 6);
        ctx.strokeStyle = 'rgba(200,166,0,0.45)';
        ctx.stroke();
        ctx.setLineDash([]);
      });

      ctx.restore();
    }
  };
}

function roundRect(ctx, x, y, width, height, radius) {
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.lineTo(x + width - radius, y);
  ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
  ctx.lineTo(x + width, y + height - radius);
  ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
  ctx.lineTo(x + radius, y + height);
  ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
  ctx.lineTo(x, y + radius);
  ctx.quadraticCurveTo(x, y, x + radius, y);
  ctx.closePath();
}

function buildRecognitionGalleryItems(realItems) {
  const safeRealItems = Array.isArray(realItems) ? realItems : [];

  const structuralPlaceholders = [
    {
      kind: 'placeholder',
      type: 'official',
      label: 'Premio oficial',
      season: 'Disponible',
      visualType: 'placeholder-medal'
    },
    {
      kind: 'placeholder',
      type: 'promotion',
      label: 'Ascenso',
      season: 'Disponible',
      visualType: 'placeholder-promotion'
    },
    {
      kind: 'placeholder',
      type: 'special',
      label: 'Premio especial',
      season: 'Disponible',
      visualType: 'placeholder-special'
    }
  ];

  const items = [...safeRealItems];
  const usedInCurrentBlock = items.length % 3;

  if (items.length === 0) {
    return [...structuralPlaceholders];
  }

  if (usedInCurrentBlock === 0) {
    return [...items, ...structuralPlaceholders];
  }

  const placeholdersToCompleteBlock = structuralPlaceholders.slice(usedInCurrentBlock);

  return [...items, ...placeholdersToCompleteBlock];
}

function chunkRecognitionItems(items, size) {
  const chunks = [];

  for (let i = 0; i < items.length; i += size) {
    chunks.push(items.slice(i, i + size));
  }

  return chunks.length ? chunks : [[]];
}

function recognitionVisualType(item) {
  const kind = String(item.kind || '').trim().toLowerCase();
  const type = String(item.type || item.code || '').trim().toLowerCase();

  if (kind === 'placeholder') return item.visualType || 'placeholder-neutral';
  if (kind === 'medal') return 'medal';

  if (
    kind === 'promotion' ||
    type.includes('ascenso') ||
    type.includes('promotion') ||
    type.includes('promo')
  ) {
    return 'promotion';
  }

  return 'special';
}

function changeRecognitionPage(pageKey, direction) {
  const current = Number(recognitionPageByPlayer[pageKey] || 0);
  recognitionPageByPlayer[pageKey] = current + Number(direction || 0);
  renderJugadores();
}

function setRecognitionPage(pageKey, pageIndex) {
  recognitionPageByPlayer[pageKey] = Number(pageIndex || 0);
  renderJugadores();
}

function playerRecognitionItems(p) {
  const playerName = String(p.player || '').trim();

  if (!playerName || !Array.isArray(playerRecognitions)) return [];

  return playerRecognitions
    .filter(r => {
      const rowPlayer = String(r.player || '').trim();
      const isActive = String(r.is_active).toLowerCase();

      return (
        rowPlayer === playerName &&
        r.recognition_label &&
        r.recognition_asset &&
        isActive !== 'false' &&
        isActive !== '0'
      );
    })
    .map(r => ({
      kind: String(r.recognition_type || '').trim().toLowerCase(),
      code: String(r.recognition_code || '').trim(),
      label: String(r.recognition_label || '').trim(),
      type: String(r.recognition_code || '').trim().toLowerCase(),
      season: String(r.season || '').trim(),
      asset: String(r.recognition_asset || '').trim(),
      seasonOrder: Number(r.season_order || 0),
      displayOrder: Number(r.display_order || 999)
    }))
    .sort((a, b) =>
      b.seasonOrder - a.seasonOrder ||
      a.displayOrder - b.displayOrder ||
      a.label.localeCompare(b.label)
    );
}

function playerRecognitionItemHTML(item) {
  const seasonText = achievementSeasonLabel(item.season);
  const visualType = recognitionVisualType(item);
  const isPlaceholder = String(item.kind || '').toLowerCase() === 'placeholder';

  if (isPlaceholder) {
    return `

        <div class="player-recognition-season">${item.season || '&nbsp;'}</div>
      </div>
    `;
  }

  return `
    <div
      class="player-recognition-item ${visualType} ${item.type}"
      title="${item.label} · ${seasonText}"
      data-asset="${assetPath}"
    >
      <div class="player-recognition-media">
        <img
          class="player-recognition-img ${visualType}"
          src="${assetPath}"
          alt="${item.label}"
          loading="lazy"
          onerror="this.style.display='none'; this.closest('.player-recognition-item').classList.add('asset-missing');"
        />

      <div class="player-recognition-title">${item.label}</div>
